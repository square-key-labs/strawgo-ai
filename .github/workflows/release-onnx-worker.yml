name: Release onnx-worker

# Triggers on version tags — push v0.1.0, v1.2.3, etc.
# Builds self-contained onnx-worker binaries for all supported platforms and
# uploads them as assets on the GitHub Release created for the tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create releases + upload assets

jobs:
  # ── Build one binary per platform ────────────────────────────────────────
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64 — native build
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: onnx-worker-linux-amd64

          # macOS Apple Silicon — native on macos-latest (arm64 runner)
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: onnx-worker-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cargo registry + git sources cached across runs.
      # Keyed on Cargo.lock so a dependency update invalidates the cache.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ matrix.target }}-cargo-${{ hashFiles('onnx-worker/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build
        working-directory: onnx-worker
        run: cargo build --release --target ${{ matrix.target }}

      # Rename to the platform-specific asset name and mark executable.
      - name: Stage artifact
        run: |
          cp onnx-worker/target/${{ matrix.target }}/release/onnx-worker \
             ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Verify binary runs
        run: ./${{ matrix.artifact }} --help 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1   # only needed for the release job below

  # ── Create the GitHub Release and attach all four binaries ───────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Show artifacts
        run: ls -lh dist/

      # softprops/action-gh-release creates a Release for the tag that
      # triggered this workflow and uploads the specified files as assets.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/onnx-worker-*
          generate_release_notes: true   # auto-generate changelog from commits
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-rc.1 → pre-release
