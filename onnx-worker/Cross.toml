# Cross.toml — configuration for cross-rs cross-compilation
# See https://github.com/cross-rs/cross/wiki/Configuration

# The default aarch64-unknown-linux-gnu cross image is Ubuntu 16.04
# with OpenSSL 1.0.x, which is too old for openssl-sys 0.9+.
# The `edge` tag is based on Ubuntu 20.04 (OpenSSL 1.1.1) which satisfies
# the minimum version requirement without any extra configuration.
[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"
