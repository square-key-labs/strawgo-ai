# Cross.toml — configuration for cross-rs cross-compilation
# See https://github.com/cross-rs/cross/wiki/Configuration

# The ort crate downloads the ORT runtime at build time over HTTPS,
# which pulls in openssl-sys as a build-time dependency. The default
# cross Docker images don't include OpenSSL dev headers, so we install
# them before the build starts.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update -qq",
    "apt-get install --assume-yes --no-install-recommends libssl-dev pkg-config",
]
